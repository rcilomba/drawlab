<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <title>Drawlab formularregistrering</title>
  </head>
  <body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="project-type">
        <option value="boligejer">Boligejer</option>
        <option value="husejer">Husejer</option>
        <option value="boligforening">Boligforening</option>
        <option value="kursus">Kursus</option>
        <option value="andet">Andet</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
